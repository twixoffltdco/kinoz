<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINOZ — Смотреть кино, сериалы и ТВ-каналы онлайн</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://kinoboxtv.tatnet.app/kinobox.js"></script>
    <style>
        :root {
            --wink-purple: #9b22ea;
            --wink-pink: #ff0092;
            --wink-bg: #121419;
            --wink-card: #1d212a;
            --wink-text: #ffffff;
            --wink-secondary: #9299a3;
            --wink-gradient: linear-gradient(90deg, #9b22ea 0%, #ff0291 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--wink-bg);
            color: var(--wink-text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER в стиле Wink */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: rgba(18, 20, 25, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--wink-text);
            cursor: pointer;
            text-transform: uppercase;
        }
        .logo span { color: var(--wink-pink); }

        .nav-links { display: flex; gap: 24px; margin-left: 40px; }
        .nav-links a {
            color: var(--wink-secondary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--wink-text); }

        .search-bar {
            background: #272c35;
            border-radius: 8px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            flex-grow: 0;
            width: 300px;
            margin-left: auto;
            margin-right: 20px;
        }
        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            padding-left: 10px;
            outline: none;
            width: 100%;
        }

        /* Герой-баннер */
        .hero {
            position: relative;
            height: 90vh;
            display: flex;
            align-items: center;
            padding: 0 5%;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center 20%;
            transition: opacity 0.5s;
        }
        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, var(--wink-bg) 0%, rgba(18,20,25,0.7) 50%, transparent 100%),
                        linear-gradient(0deg, var(--wink-bg) 0%, transparent 50%);
        }

        .hero-content { position: relative; z-index: 10; max-width: 600px; }
        .hero-title { font-size: 48px; font-weight: 800; margin-bottom: 15px; }
        
        .btn-wink {
            background: var(--wink-gradient);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: opacity 0.2s;
        }
        .btn-wink:hover { opacity: 0.9; }

        /* Сетка фильмов */
        .section { padding: 40px 5%; }
        .section-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
        
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .movie-card {
            cursor: pointer;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .movie-card:hover { transform: scale(1.05); z-index: 5; }
        .movie-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 12px; }
        .movie-title { margin-top: 8px; font-size: 14px; font-weight: 500; }

        /* Плеер */
        .player-overlay {
            position: fixed; inset: 0; background: #000; z-index: 3000; display: none;
        }
        .player-overlay.active { display: block; }
        .close-player {
            position: absolute; top: 20px; right: 20px; z-index: 3100;
            background: rgba(255,255,255,0.1); border: none; color: white;
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
        }

        /* Уведомление КУКИ (дизайн Wink) */
        .cookie-banner {
            position: fixed; bottom: 20px; right: 20px; left: 20px;
            background: var(--wink-card); padding: 20px; border-radius: 16px;
            display: none; align-items: center; justify-content: space-between;
            z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .page { display: none; padding-top: 80px; }
        .page.active { display: block; }

        @media (max-width: 768px) {
            .nav-links, .search-bar { display: none; }
            .hero-title { font-size: 32px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="showPage('home')">KINO<span>Z</span></div>
        <nav class="nav-links">
            <a href="#" class="active" onclick="showPage('home')">Главная</a>
            <a href="#" onclick="showPage('movies')">Фильмы</a>
            <a href="#" onclick="showPage('series')">Сериалы</a>
            <a href="#" onclick="showPage('info')">Инфо</a>
        </nav>
        <div class="search-bar">
            <i class="fas fa-search" style="color: grey;"></i>
            <input type="text" id="search-input" placeholder="Фильмы, сериалы..." onkeypress="if(event.key==='Enter')performSearch()">
        </div>
        <div class="user-action">
            <i class="far fa-user-circle" style="font-size: 24px; cursor: pointer;"></i>
        </div>
    </header>

    <!-- Главная страница -->
    <main id="page-home" class="page active">
        <section class="hero">
            <div class="hero-bg" id="hero-bg"></div>
            <div class="hero-content">
                <h1 class="hero-title" id="hero-title">Загрузка...</h1>
                <p id="hero-meta" style="margin-bottom: 25px; color: var(--wink-secondary);"></p>
                <div class="hero-buttons">
                    <button class="btn-wink" id="hero-play"><i class="fas fa-play"></i> Смотреть бесплатно</button>
                </div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">Популярное</h2>
            <div class="movie-grid" id="trending-grid"></div>
        </section>
    </main>

    <!-- Страница категорий -->
    <main id="page-movies" class="page">
        <section class="section">
            <h2 class="section-title">Каталог фильмов</h2>
            <div class="movie-grid" id="movies-grid"></div>
        </section>
    </main>

    <main id="page-info" class="page">
        <section class="section" style="max-width: 800px;">
            <h2 class="section-title">О проекте KINOZ</h2>
            <p style="color: var(--wink-secondary);">Бесплатный онлайн-кинотеатр с интерфейсом в стиле Wink. Весь контент доступен без регистрации и подписок.</p>
        </section>
    </main>

    <!-- Плеер -->
    <div class="player-overlay" id="player-overlay">
        <button class="close-player" onclick="closePlayer()"><i class="fas fa-times"></i></button>
        <div id="player-container" style="width:100%; height:100%;"></div>
    </div>

    <!-- Куки -->
    <div class="cookie-banner" id="cookie-banner">
        <span>Мы используем cookies для персонализации сервиса KINOZ.</span>
        <button class="btn-wink" onclick="acceptCookies()">Принять</button>
    </div>

    <script>
        const K_TOKEN='960dc4e3-9eae-4072-8f0c-98a5ed6c0d2a', API='https://kinopoiskapiunofficial.tech/api';
        let state = { currentId: null };

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            loadHero();
            loadGrid('TOP_100_POPULAR_FILMS', 'trending-grid');
            if(!localStorage.getItem('kb_cookies')) document.getElementById('cookie-banner').style.display = 'flex';
        });

        async function loadHero() {
            const r = await fetch(API+'/v2.2/films/top?type=TOP_100_POPULAR_FILMS', {headers:{'X-API-KEY':K_TOKEN}});
            const d = await r.json();
            const f = d.films[0];
            document.getElementById('hero-bg').style.backgroundImage = `url('${f.posterUrl}')`;
            document.getElementById('hero-title').innerText = f.nameRu;
            document.getElementById('hero-meta').innerText = `${f.year} • ${f.rating || '8.1'} • ${f.genres[0].genre}`;
            document.getElementById('hero-play').onclick = () => openPlayer(f.kinopoiskId || f.filmId);
        }

        async function loadGrid(type, target) {
            const r = await fetch(`${API}/v2.2/films/top?type=${type}`, {headers:{'X-API-KEY':K_TOKEN}});
            const d = await r.json();
            const grid = document.getElementById(target);
            d.films.forEach(f => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => openPlayer(f.kinopoiskId || f.filmId);
                card.innerHTML = `<img src="${f.posterUrlPreview}" class="movie-poster"><div class="movie-title">${f.nameRu}</div>`;
                grid.appendChild(card);
            });
        }

        function openPlayer(id) {
            state.currentId = id;
            document.getElementById('player-overlay').classList.add('active');
            kinobox('#player-container', {
                search: { kinopoisk: id },
                players: ['alloha', 'kodik', 'videocdn']
            });
        }

        function closePlayer() {
            document.getElementById('player-overlay').classList.remove('active');
            document.getElementById('player-container').innerHTML = '';
        }

        function showPage(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+name).classList.add('active');
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');
        }

        function acceptCookies() {
            localStorage.setItem('kb_cookies', true);
            document.getElementById('cookie-banner').style.display = 'none';
        }

        async function performSearch() {
            const q = document.getElementById('search-input').value;
            const r = await fetch(`${API}/v2.1/films/search-by-keyword?keyword=${q}`, {headers:{'X-API-KEY':K_TOKEN}});
            const d = await r.json();
            showPage('movies');
            const grid = document.getElementById('movies-grid');
            grid.innerHTML = '';
            d.films.forEach(f => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => openPlayer(f.filmId);
                card.innerHTML = `<img src="${f.posterUrlPreview}" class="movie-poster"><div class="movie-title">${f.nameRu}</div>`;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
